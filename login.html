<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inicio de Sesión | TechNova</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="main-header">
    <nav class="navbar">
        <div class="logo">
            <a href="index.html">
                <img src="img/er.png" alt="Logo TechNova" width="100" height="100">
            </a>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Inicio</a></li>
            <li><a href="index.html#productos">Productos</a></li>
            <li><a href="index.html#services_page">Servicios</a></li>
            <li><a href="index.html#projects">Proyectos</a></li>
            <li><a href="index.html#contacto">Contacto</a></li>
        </ul>
        <div class="nav-actions">
            <a href="login.html" class="btn-login">Inicio de Sesión</a>
            <a href="registro.html" class="btn-registro">Registro</a>
        </div>
    </nav>
</header>

<section class="login-wrapper">
    <div class="login-container">
        <h2><i class="fa-solid fa-lock" style="color:#6d28d9; margin-right:8px;"></i>Inicio de Sesión</h2>

        <div id="alerta" style="display:none; padding:10px 14px; border-radius:8px; margin-bottom:16px; font-size:0.9rem;"></div>

        <form id="formLogin">
            <div class="form-group" style="margin-bottom:16px;">
                <label>Correo electrónico</label>
                <input type="email" id="email" name="email" placeholder="tu@email.com" required>
            </div>
            <div class="form-group" style="margin-bottom:16px;">
                <label>Contraseña</label>
                <input type="password" id="password" name="password" placeholder="Tu contraseña" required>
            </div>
            <div class="form-group" style="margin-bottom:20px;">
                <label>Rol</label>
                <select id="rol" style="width:100%;padding:12px 16px;border:1px solid #e5e7eb;border-radius:8px;background:#f9fafb;font-size:1rem;">
                    <option value="">Seleccione su rol</option>
                    <option value="Administrador">Administrador</option>
                    <option value="Diseñador">Diseñador</option>
                    <option value="Desarrollador">Desarrollador</option>
                    <option value="Cliente">Cliente</option>
                </select>
            </div>
            <button type="submit" class="btn-submit" id="btnLogin">
                <span id="btnTexto">Iniciar Sesión</span>
                <i class="fa-solid fa-arrow-right-to-bracket"></i>
            </button>
        </form>

        <p style="text-align:center;margin-top:20px;color:#6b7280;font-size:0.9rem;">
            ¿No tienes cuenta? <a href="registro.html" style="color:#6d28d9;font-weight:600;">Regístrate aquí</a>
        </p>
    </div>
</section>

<script>
document.getElementById('formLogin').addEventListener('submit', async function(e) {
    e.preventDefault();
    const alerta = document.getElementById('alerta');
    const btn    = document.getElementById('btnLogin');
    document.getElementById('btnTexto').textContent = 'Verificando...';
    btn.disabled = true;

    const formData = new FormData();
    formData.append('email',    document.getElementById('email').value);
    formData.append('password', document.getElementById('password').value);

    try {
        const res  = await fetch('php/login.php', { method: 'POST', body: formData });
        const data = await res.json();

        alerta.style.display = 'block';
        if (data.error) {
            alerta.style.cssText = 'display:block;padding:10px 14px;border-radius:8px;margin-bottom:16px;font-size:.9rem;background:#fee2e2;color:#dc2626;border:1px solid #fca5a5;';
            alerta.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i> ' + data.mensaje;
        } else {
            alerta.style.cssText = 'display:block;padding:10px 14px;border-radius:8px;margin-bottom:16px;font-size:.9rem;background:#d1fae5;color:#065f46;border:1px solid #6ee7b7;';
            alerta.innerHTML = '<i class="fa-solid fa-circle-check"></i> ¡Bienvenido, ' + data.nombre + '!';
            setTimeout(() => {
                window.location.href = (data.rol !== 'Cliente') ? 'dashboard.html' : 'index.html';
            }, 1000);
        }
    } catch(err) {
        alerta.style.cssText = 'display:block;padding:10px 14px;border-radius:8px;margin-bottom:16px;font-size:.9rem;background:#fee2e2;color:#dc2626;border:1px solid #fca5a5;';
        alerta.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i> Error de conexión con el servidor';
    }

    btn.disabled = false;
    document.getElementById('btnTexto').textContent = 'Iniciar Sesión';
});
</script>
</body>
</html>
