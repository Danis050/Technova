<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | TechNova</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 4px;
            z-index: 200;
        }
        .hamburger span {
            display: block;
            width: 25px;
            height: 2px;
            background: #0f172a;
            border-radius: 2px;
            transition: all 0.3s ease;
        }
        .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        .hamburger.open span:nth-child(2) { opacity: 0; }
        .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

        @media (max-width: 768px) {
            .navbar {
                flex-wrap: wrap;
                padding: 12px 16px;
            }
            .hamburger { display: flex; }
            .nav-links {
                display: none;
                width: 100%;
                flex-direction: column;
                gap: 0;
                padding: 8px 0;
                border-top: 1px solid #e5e7eb;
                margin-top: 8px;
            }
            .nav-links.open { display: flex; }
            .nav-links li a {
                display: block;
                padding: 12px 8px;
                border-bottom: 1px solid #f1f5f9;
            }
            .nav-actions {
                display: none;
                width: 100%;
                flex-direction: column;
                gap: 8px;
                padding: 12px 0 4px;
            }
            .nav-actions.open { display: flex; }
            .nav-actions .btn-login,
            .nav-actions .btn-registro {
                text-align: center;
                width: 100%;
                padding: 12px;
            }

            .login-wrapper {
                padding: 20px 16px !important;
                align-items: flex-start;
            }
            .login-container {
                width: 100% !important;
                max-width: 100% !important;
                padding: 24px 20px !important;
                margin: 0 !important;
            }
            .login-container h2 { font-size: 1.4rem !important; }
        }

        @media (max-width: 480px) {
            .login-container { padding: 20px 16px !important; }
        }
    </style>
</head>
<body>

<header class="main-header">
    <nav class="navbar">
        <div class="logo">
            <a href="index.html">
                <img src="img/er.png" alt="Logo TechNova" width="100" height="100">
            </a>
        </div>

        <button class="hamburger" id="hamburger" aria-label="Menú">
            <span></span><span></span><span></span>
        </button>

        <ul class="nav-links" id="navLinks">
            <li><a href="index.html">Inicio</a></li>
            <li><a href="index.html#productos">Productos</a></li>
            <li><a href="index.html#services_page">Servicios</a></li>
            <li><a href="index.html#projects">Proyectos</a></li>
            <li><a href="index.html#contacto">Contacto</a></li>
        </ul>

        <div class="nav-actions" id="navActions">
            <a href="login.html" class="btn-login">Inicio de Sesión</a>
        </div>
    </nav>
</header>

<section class="login-wrapper">
    <div class="login-container">
        <h2><i class="fa-solid fa-user-plus" style="color:#6d28d9;margin-right:8px;"></i>Crear Cuenta</h2>

        <div id="alerta" style="display:none;padding:10px 14px;border-radius:8px;margin-bottom:16px;font-size:.9rem;"></div>

        <form id="formRegistro">
            <div class="form-group" style="margin-bottom:16px;">
                <label>Nombre</label>
                <input type="text" id="nombre" placeholder="Tu nombre" required>
            </div>
            <div class="form-group" style="margin-bottom:16px;">
                <label>Apellido</label>
                <input type="text" id="apellido" placeholder="Tu apellido" required>
            </div>
            <div class="form-group" style="margin-bottom:16px;">
                <label>Correo electrónico</label>
                <input type="email" id="email" placeholder="tu@email.com" required>
            </div>
            <div class="form-group" style="margin-bottom:16px;">
                <label>Contraseña</label>
                <input type="password" id="password" placeholder="Mínimo 6 caracteres" required>
            </div>
            <div class="form-group" style="margin-bottom:24px;">
                <label>Confirmar contraseña</label>
                <input type="password" id="confirmar" placeholder="Repite tu contraseña" required>
            </div>
            <button type="submit" class="btn-submit" id="btnRegistro">
                <span id="btnTexto">Registrarse</span>
                <i class="fa-solid fa-user-check"></i>
            </button>
        </form>

        <p style="text-align:center;margin-top:20px;color:#6b7280;font-size:.9rem;">
            ¿Ya tienes cuenta? <a href="login.html" style="color:#6d28d9;font-weight:600;">Inicia sesión aquí</a>
        </p>
    </div>
</section>

<script>
    // Hamburger
    const hamburger  = document.getElementById('hamburger');
    const navLinks   = document.getElementById('navLinks');
    const navActions = document.getElementById('navActions');
    hamburger.addEventListener('click', () => {
        hamburger.classList.toggle('open');
        navLinks.classList.toggle('open');
        navActions.classList.toggle('open');
    });

    // Registro
    document.getElementById('formRegistro').addEventListener('submit', async function(e) {
        e.preventDefault();
        const alerta = document.getElementById('alerta');
        const btn    = document.getElementById('btnRegistro');
        document.getElementById('btnTexto').textContent = 'Registrando...';
        btn.disabled = true;

        const formData = new FormData();
        formData.append('nombre',    document.getElementById('nombre').value);
        formData.append('apellido',  document.getElementById('apellido').value);
        formData.append('email',     document.getElementById('email').value);
        formData.append('password',  document.getElementById('password').value);
        formData.append('confirmar', document.getElementById('confirmar').value);

        try {
            const res  = await fetch('php/registro.php', { method: 'POST', body: formData });
            const data = await res.json();

            alerta.style.display = 'block';
            if (data.error) {
                alerta.style.cssText = 'display:block;padding:10px 14px;border-radius:8px;margin-bottom:16px;font-size:.9rem;background:#fee2e2;color:#dc2626;border:1px solid #fca5a5;';
                alerta.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i> ' + data.mensaje;
            } else {
                alerta.style.cssText = 'display:block;padding:10px 14px;border-radius:8px;margin-bottom:16px;font-size:.9rem;background:#d1fae5;color:#065f46;border:1px solid #6ee7b7;';
                alerta.innerHTML = '<i class="fa-solid fa-circle-check"></i> ¡Cuenta creada! Redirigiendo al login...';
                setTimeout(() => { window.location.href = 'login.html'; }, 1500);
            }
        } catch(err) {
            alerta.style.cssText = 'display:block;padding:10px 14px;border-radius:8px;margin-bottom:16px;font-size:.9rem;background:#fee2e2;color:#dc2626;border:1px solid #fca5a5;';
            alerta.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i> Error de conexión con el servidor';
        }

        btn.disabled = false;
        document.getElementById('btnTexto').textContent = 'Registrarse';
    });
</script>
</body>
</html>
